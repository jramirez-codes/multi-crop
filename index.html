<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Crop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="toolbar">
      <label id="upload-btn" class="btn">
        <input type="file" id="file-input" accept="image/*" hidden>
        Upload Image
      </label>
      <div id="tool-group">
        <button class="btn tool-btn active" data-tool="select" title="Select regions (S)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" stroke-dasharray="4 2"/></svg>
          Select
        </button>
        <button class="btn tool-btn" data-tool="pan" title="Pan canvas (Space+drag)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M2 12h20M5 5l2 2M17 5l-2 2M5 19l2-2M17 19l-2-2"/></svg>
          Pan
        </button>
      </div>
      <div id="zoom-group">
        <button class="btn" id="zoom-out" title="Zoom out (-)">−</button>
        <span id="zoom-level">100%</span>
        <button class="btn" id="zoom-in" title="Zoom in (+)">+</button>
        <button class="btn" id="zoom-fit" title="Fit to view (F)">Fit</button>
      </div>
      <label class="toggle-label" title="Remove detected background from exported crops">
        <input type="checkbox" id="remove-bg-toggle" checked>
        <span>Remove BG</span>
      </label>
      <button class="btn primary" id="save-btn" title="Export crops (Ctrl+S)">Export Crops</button>
    </div>

    <div id="main">
      <div id="canvas-container">
        <div id="drop-zone" class="visible">
          <div id="drop-zone-content">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <p>Drop an image here or click Upload</p>
          </div>
        </div>
        <canvas id="canvas"></canvas>
      </div>

      <div id="sidebar">
        <div id="sidebar-header">
          <h2>Regions</h2>
          <span id="region-count">0</span>
        </div>
        <div id="region-list"></div>
        <div id="sidebar-empty">
          <p>Draw rectangles on the image to create crop regions</p>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
